name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # C++20 — polyfill path (expected/byteswap shims)
          - name: x86_64 C++20 (SSE)
            runner: ubuntu-24.04
            os: linux
            cxx_standard: 20
          - name: arm64 C++20 (NEON)
            runner: [self-hosted, macOS, ARM64]
            os: macos
            cxx_standard: 20
          # C++23 — std::expected / std::byteswap
          - name: x86_64 C++23 (SSE)
            runner: ubuntu-24.04
            os: linux
            cxx_standard: 23
          - name: arm64 C++23 (NEON)
            runner: [self-hosted, macOS, ARM64]
            os: macos
            cxx_standard: 23
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake clang g++-14 libgtest-dev libpugixml-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install cmake googletest pugixml

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_STANDARD=${{ matrix.cxx_standard }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
